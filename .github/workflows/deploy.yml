name: Deploy Protected CineSeat to GitHub Pages

on:
  push:
    branches:
      - main # Hoặc master tùy theo tên nhánh của bạn

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      # ROBOT LẤY SECRETS ĐỂ ĐÈ LÊN FILE CHATBOT.JS TRƯỚC KHI XUẤT BẢN
      - name: Tiêm API Key bảo mật từ GitHub Secrets vào file chatbot.js
        env:
          REAL_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node -e "
            const fs = require('fs');
            let content = fs.readFileSync('js/chatbot.js', 'utf8');
            content = content.replace('__GEMINI_API_KEY__', process.env.REAL_KEY);
            fs.writeFileSync('js/chatbot.js', content, 'utf8');
          "

      - name: Cấu hình môi trường GitHub Pages
        uses: actions/configure-pages@v5

      - name: Tải code lên hệ thống
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Xuất bản lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
