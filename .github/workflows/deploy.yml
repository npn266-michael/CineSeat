name: Deploy Protected CineSeat to GitHub Pages

on:
  push:
    branches:
      - main # Hoặc master tùy theo tên nhánh của bạn

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      # ROBOT LẤY SECRETS ĐỂ ĐÈ LÊN FILE CHATBOT.JS TRƯỚC KHI XUẤT BẢN
      - name: Tiêm API Key bảo mật từ GitHub Secrets vào file chatbot.js
        env:
          REAL_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node -e "
            const fs = require('fs');
            const path = 'js/chatbot.js';
            let content = fs.readFileSync(path, 'utf8');
            
            // Debug: Kiểm tra xem file có chứa từ khóa không
            if (!content.includes('__GEMINI_API_KEY__')) {
                console.error('LỖI: Không tìm thấy __GEMINI_API_KEY__ trong file!');
                process.exit(1); // Dừng workflow nếu không tìm thấy
            }
            
            const cleanKey = process.env.REAL_KEY.trim();
            content = content.replace('__GEMINI_API_KEY__', cleanKey);
            fs.writeFileSync(path, content, 'utf8');
            console.log('Tiêm Key thành công!');
          "

      - name: Cấu hình môi trường GitHub Pages
        uses: actions/configure-pages@v5

      - name: Tải code lên hệ thống
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Xuất bản lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
