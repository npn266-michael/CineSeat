name: Deploy Protected CineSeat to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Tiêm API Key bảo mật vào file mã nguồn
        run: |
          sed -i 's/__GEMINI_API_KEY__/${{ secrets.GEMINI_KEY }}/g' js/chatbot.js

      - name: Cấu hình môi trường GitHub Pages
        uses: actions/configure-pages@v4

      - name: Tải toàn bộ thư mục lên hệ thống lưu trữ
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Xuất bản lên GitHub Pages thực tế
        id: deployment
        uses: actions/deploy-pages@v4
